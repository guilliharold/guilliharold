<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harold Guilline — Digital Resume & Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Background grid -->
  <div class="bg-grid" aria-hidden="true"></div>

  <!-- Glow orb -->
  <div class="orb" aria-hidden="true"></div>

  <main class="container">

    <!-- Top bar -->
    <header class="topbar">
      <span class="monogram">HG</span>
      <span class="status-pill">
        <span class="status-dot"></span>
        Work in progress
      </span>
    </header>

    <!-- Core message -->
    <section class="hero">
      <p class="eyebrow">Digital Resume &amp; Portfolio</p>

      <h1 class="headline">
        Something<br />
        <em>considered</em><br />
        is coming.
      </h1>

      <p class="sub">
        I'm currently building this space with care.<br />
        Check back soon — it'll be worth the wait.
      </p>

      <!-- Notify form -->
      <div class="notify-wrap">
        <form class="notify-form" id="notifyForm" novalidate>
          <input
            type="email"
            id="emailInput"
            placeholder="your@email.com"
            autocomplete="email"
            aria-label="Email address"
            required
          />
          <button type="submit">Notify me</button>
        </form>
        <p class="form-msg" id="formMsg" aria-live="polite"></p>
      </div>
    </section>

    <!-- Footer row -->
    <footer class="foot">
      <span>© 2026 Harold Guilline</span>
      <div class="foot-links">
        <a href="mailto:admin@guilliharold.com">admin@guilliharold.com</a>
      </div>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
